function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open('nhnn_v1',1);
  r.onerror=()=>rej(r.error);
  r.onsuccess=()=>res(r.result);
  r.onupgradeneeded=e=>{
    const db=e.target.result;
    if(!db.objectStoreNames.contains('kv'))db.createObjectStore('kv');
  };
});}

const store={
  async get(k,d=null){
    try{
      const db=await openDB();
      return new Promise(res=>{
        const r=db.transaction('kv','readonly').objectStore('kv').get(k);
        r.onsuccess=()=>res(r.result??d);
        r.onerror=()=>res(d);
      });
    }catch{return d;}
  },
  async set(k,v){
    try{
      const db=await openDB();
      return new Promise((res,rej)=>{
        const tx=db.transaction('kv','readwrite');
        tx.objectStore('kv').put(v,k);
        tx.oncomplete=res;
        tx.onerror=()=>rej(tx.error);
      });
    }catch{}
  },
};

function uid(){return `${Date.now()}-${Math.random().toString(36).substr(2,7)}`;}

function compressImage(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const s=Math.min(1,600/Math.max(img.width,img.height));
        c.width=img.width*s;c.height=img.height*s;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.75));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

function eHtml(title,rows,footer=''){
  return `<div style="font-family:sans-serif;max-width:600px;margin:0 auto;background:#f8f8f8;padding:20px"><div style="background:#1E3A5F;padding:24px;border-radius:8px 8px 0 0;text-align:center"><h2 style="color:#60A5FA;margin:0;font-size:20px">NHNN Stock Control</h2><p style="color:#93C5FD;margin:6px 0 0;font-size:13px">National Hospital for Neurology and Neurosurgery</p></div><div style="background:white;padding:24px;border-radius:0 0 8px 8px;border:1px solid #ddd"><h3 style="color:#1E3A5F;margin:0 0 16px">${title}</h3><table style="width:100%;border-collapse:collapse">${rows.map(([k,v])=>`<tr><td style="padding:8px 12px;background:#f5f5f5;font-weight:600;color:#555;width:40%;border-bottom:1px solid #eee">${k}</td><td style="padding:8px 12px;color:#333;border-bottom:1px solid #eee">${v}</td></tr>`).join('')}</table>${footer?`<p style="color:#888;font-size:12px;margin-top:16px">${footer}</p>`:''}</div><p style="text-align:center;color:#aaa;font-size:11px;margin-top:12px">NHNN Stock Control — Do not reply to this email</p></div>`;
}


async function sendEmail(to,subj,html){
  const toStr=(Array.isArray(to)?to:[to]).filter(Boolean).join(', ');
  if(!toStr)return;
  try{
    await emailjs.send('service_zg9c8gv','template_ynznoew',{to_email:toStr,subject:subj,html_body:html});
  }catch(e){console.error('Email failed:',e);}
}

const { useState, useEffect, useRef } = React;

function BarcodeModal({onScan,onClose}){
  const vref=useRef(null),streamRef=useRef(null),animRef=useRef(null);
  const[status,setStatus]=useState('starting');
  useEffect(()=>{
    (async()=>{
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
        streamRef.current=stream;
        if(vref.current){vref.current.srcObject=stream;await vref.current.play();}
        if('BarcodeDetector' in window){
          const det=new BarcodeDetector({formats:['code_128','code_39','ean_13','ean_8','upc_a','qr_code']});
          setStatus('scanning');
          const scan=async()=>{
            if(vref.current?.readyState>=2){try{const codes=await det.detect(vref.current);if(codes.length>0){onScan(codes[0].rawValue);return;}}catch{}}
            animRef.current=requestAnimationFrame(scan);
          };
          animRef.current=requestAnimationFrame(scan);
        }else{setStatus('nosupport');}
      }catch{setStatus('error');}
    })();
    return()=>{streamRef.current?.getTracks().forEach(t=>t.stop());if(animRef.current)cancelAnimationFrame(animRef.current);};
  },[]);
  const close=()=>{streamRef.current?.getTracks().forEach(t=>t.stop());if(animRef.current)cancelAnimationFrame(animRef.current);onClose();};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.85)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{...S.card,width:'90%',maxWidth:380}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}>
          <span style={{color:C.txt,fontWeight:600,fontSize:16}}>Scan Barcode</span>
          <button onClick={close} style={{...S.btn,background:'none',color:C.sub,fontSize:20,padding:'0 4px'}}>✕</button>
        </div>
        {status==='error'&&<p style={{color:C.red,margin:0}}>Camera access denied or unavailable.</p>}
        {status==='nosupport'&&<p style={{color:C.ora,margin:0}}>Barcode scanning not supported on this browser. Type the code manually.</p>}
        <div style={{borderRadius:8,overflow:'hidden',background:'#000',position:'relative'}}>
          <video ref={vref} style={{width:'100%',display:'block'}}/>

function PinScreen({onUnlock}){
  const[storedPin,setStoredPin]=useState(null);
  const[input,setInput]=useState('');
  const[confirm,setConfirm]=useState('');
  const[step,setStep]=useState('load');
  const[error,setError]=useState('');
  const[shake,setShake]=useState(false);
  useEffect(()=>{store.get('app_pin').then(p=>{setStoredPin(p);setStep(p?'enter':'setup');});},[]);
  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};
  const currentVal=step==='confirm'?confirm:input;
  const pressDigit=d=>{
    if(step==='enter'){
      const next=input+d;setInput(next);
      if(next.length===4){
        if(next===storedPin){onUnlock();}
        else{setError('Incorrect PIN');doShake();setTimeout(()=>{setInput('');setError('');},600);}
      }
    }else if(step==='setup'){
      if(input.length<4)setInput(p=>p+d);
    }else if(step==='confirm'){
      const next=confirm+d;setConfirm(next);
      if(next.length===4){
        if(next===input){store.set('app_pin',input).then(()=>onUnlock());}
        else{setError('PINs do not match');doShake();setTimeout(()=>{setConfirm('');setError('');},600);}
      }
    }
  };
  const del=()=>{
    if(step==='enter')setInput(p=>p.slice(0,-1));
    else if(step==='setup')setInput(p=>p.slice(0,-1));
    else setConfirm(p=>p.slice(0,-1));
  };
  if(step==='load')return null;
  const digits=[1,2,3,4,5,6,7,8,9,'',0,'x'];
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(160deg,#EEF2FF 0%,#F0F4FF 50%,#F8FAFF 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <img src={LOGO} style={{width:80,height:80,borderRadius:'50%',border:'3px solid #2563EB',boxShadow:'0 0 0 4px rgba(37,99,235,.1)',marginBottom:24}}/>
      <h1 style={{fontSize:22,fontWeight:800,color:'#0F172A',marginBottom:4,letterSpacing:'-0.5px'}}>NHNN Stock Control</h1>
      <p style={{color:'#64748B',fontSize:13,marginBottom:32}}>
        {step==='setup'?'Create a 4-digit PIN to secure the app':step==='confirm'?'Confirm your PIN':'Enter PIN to continue'}
      </p>
      <div style={{display:'flex',gap:14,marginBottom:8,animation:shake?'shake .4s ease':'none'}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:16,height:16,borderRadius:'50%',background:currentVal.length>i?'#2563EB':'#E2E8F0',border:'2px solid',borderColor:currentVal.length>i?'#2563EB':'#CBD5E1',transition:'all .15s'}}/>
        ))}
      </div>
      {error&&<p style={{color:'#EF4444',fontSize:13,margin:'8px 0',fontWeight:500}}>{error}</p>}
      <div style={{height:16}}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,80px)',gap:12}}>
        {digits.map((d,i)=>(
          <button key={i}
            onClick={()=>{
              if(d==='')return;
              if(d==='x'){del();return;}
              pressDigit(String(d));
            }}
            style={{border:d===''?'none':'1.5px solid #E2E8F0',background:d===''?'transparent':'#FFFFFF',width:80,height:80,fontSize:d==='x'?20:22,fontWeight:700,color:'#0F172A',borderRadius:16,boxShadow:d===''?'none':'0 1px 3px rgba(15,23,42,.08)',cursor:d===''?'default':'pointer',fontFamily:'Inter,sans-serif',transition:'all .15s',display:'flex',alignItems:'center',justifyContent:'center'}}>
            {d==='x'?'⌫':d}
          </button>
        ))}
      </div>
      {step==='setup'&&input.length===4&&(
        <button onClick={()=>setStep('confirm')} style={{background:'#2563EB',color:'#fff',border:'none',borderRadius:10,padding:'14px 40px',marginTop:20,fontSize:15,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>Continue →</button>
      )}
      <style>{"@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}"}</style>
    </div>
  );
}

function UsePartScreen({parts,users,images,updateParts,navigate,addToast}){
  const[userId,setUserId]=useState('');
  const[items,setItems]=useState([{id:uid(),part:null,qty:1}]);
  const[busy,setBusy]=useState(false);
  const setPart=(id,p)=>setItems(prev=>prev.map(i=>i.id===id?{...i,part:p}:i));
  const setQty=(id,q)=>setItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,q)}:i));
  const removeItem=id=>setItems(prev=>prev.filter(i=>i.id!==id));
  const submit=async()=>{
    if(!userId){addToast('Select your name','error');return;}
    const valid=items.filter(i=>i.part);
    if(!valid.length){addToast('Select at least one part','error');return;}
    setBusy(true);
    const user=users.find(u=>u.id===userId);
    const allEmails=users.map(u=>u.email).filter(Boolean);
    let np=[...parts];const alerts=[];
    for(const item of valid){
      const idx=np.findIndex(p=>p.id===item.part.id);if(idx===-1)continue;
      const ns=Math.max(0,np[idx].currentStock-item.qty);
      const ms=np[idx].minimumStock;
      np[idx]={...np[idx],currentStock:ns,updatedAt:new Date().toISOString()};
      if(ns===0)alerts.push({p:np[idx],status:'out',ns});
      else if(ns<ms)alerts.push({p:np[idx],status:'below',ns});
      else if(ns===ms)alerts.push({p:np[idx],status:'at',ns});
      else if(ns===ms+1)alerts.push({p:np[idx],status:'near',ns});
    }
    await updateParts(np);
    const rows=valid.map(i=>[i.part.partName,`${i.qty} unit(s) — Code: ${i.part.partCode} · Bin: ${i.part.binNumber}`]);
    await sendEmail([user.email],'✅ Parts Used — NHNN Stock Control',eHtml(`Parts used by ${user.name} on ${new Date().toLocaleString()}`,rows,'Confirmation from NHNN Stock Control system.'));
    const icons={out:'🚨',below:'🔴',at:'⚠️',near:'⚠️'};
    const lbls={out:'OUT OF STOCK',below:'BELOW MINIMUM',at:'AT MINIMUM',near:'NEARING MINIMUM'};
    for(const a of alerts){
      await sendEmail(allEmails,`${icons[a.status]} Stock Alert: ${a.p.partName} — ${lbls[a.status]}`,
        eHtml(`Stock Alert: ${lbls[a.status]}`,[['Part',a.p.partName],['Part Code',a.p.partCode],['Bin Number',a.p.binNumber],['Supplier',a.p.supplier],['Current Stock',`${a.ns} units`],['Minimum Stock',`${a.p.minimumStock} units`],['Status',lbls[a.status]],['Recorded by',user.name]],'Please arrange restock as soon as possible.'));
    }
    setBusy(false);
    addToast('Parts recorded & emails sent!','success');
    setItems([{id:uid(),part:null,qty:1}]);setUserId('');
  };
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:520,margin:'0 auto'}}>
        <button onClick={()=>navigate('home')} style={{...S.btn,background:'#FFFFFF',border:'1.5px solid #E2E8F0',color:'#64748B',padding:'8px 16px',marginBottom:20,borderRadius:10}}>← Home</button>
        <h2 style={{fontWeight:700,color:C.txt,fontSize:26,margin:'0 0 20px',letterSpacing:'-0.5px'}}>Use Part</h2>
        <div style={{...S.card,marginBottom:16}}>
          <p style={{color:'#94A3B8',fontSize:11,margin:'0 0 10px',fontWeight:700,letterSpacing:'0.5px',textTransform:'uppercase'}}>WHO ARE YOU?</p>
          <select value={userId} onChange={e=>setUserId(e.target.value)} style={{...S.inp,fontFamily:'inherit',cursor:'pointer'}}>
            <option value="">— Select your name —</option>
            {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          {!users.length&&<p style={{color:C.ora,fontSize:12,margin:'8px 0 0'}}>No users added. Go to Settings.</p>}
        </div>
        {items.map((item,idx)=>(
          <div key={item.id} style={{...S.card,marginBottom:12,position:'relative'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <p style={{color:'#94A3B8',fontSize:11,margin:0,fontWeight:700,letterSpacing:'0.5px',textTransform:'uppercase'}}>PART {idx+1}</p>
              {items.length>1&&<button onClick={()=>removeItem(item.id)} style={{...S.btn,background:'#FEF2F2',color:'#EF4444',border:'1px solid #FEE2E2',padding:'5px 12px',fontSize:12,borderRadius:6}}>Remove</button>}

            {item.part&&(
              <div style={{marginTop:12,background:'#F8FAFC',border:'1.5px solid #E2E8F0',borderRadius:12,padding:12,display:'flex',gap:12,alignItems:'center'}}>
                {images[item.part.partCode]?<img src={images[item.part.partCode]} style={{width:56,height:56,objectFit:'cover',borderRadius:8,flexShrink:0}}/>
                :<div style={{width:56,height:56,background:'#F1F5F9',borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📦</div>}
                <div style={{flex:1}}>

function ImportExcelScreen({parts,updateParts,navigate,addToast}){
  const[preview,setPreview]=useState(null);
  const[parsed,setParsed]=useState([]);
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=evt=>{
      try{
        const wb=XLSX.read(evt.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const mapped=rows.map(r=>({
          partCode:String(r['Part Code']||r['PART CODE']||r['partCode']||'').trim(),
          partNumber:String(r['Part Number']||r['PART NUMBER']||r['partNumber']||'').trim(),
          binNumber:String(r['Bin Number']||r['BIN NUMBER']||r['binNumber']||'').trim(),
          partName:String(r['Part Name']||r['PART NAME']||r['partName']||'').trim(),
          supplier:String(r['Supplier']||r['SUPPLIER']||r['supplier']||'').trim(),
          currentStock:parseInt(r['Current Stock']||r['CURRENT STOCK']||r['currentStock'])||0,
          minimumStock:parseInt(r['Minimum Stock']||r['MINIMUM STOCK']||r['minimumStock'])||0,
        })).filter(r=>r.partCode&&r.partName);
        setParsed(mapped);setPreview(mapped.slice(0,5));
      }catch{addToast('Could not read Excel file. Check the format.','error');}
    };
    r.readAsBinaryString(f);
  };
  const doImport=async()=>{
    if(!parsed.length)return;setBusy(true);
    let np=[...parts];let added=0,updated=0;
    for(const row of parsed){
      const idx=np.findIndex(p=>p.partCode===row.partCode);
      if(idx!==-1){np[idx]={...np[idx],...row,updatedAt:new Date().toISOString()};updated++;}
      else{np.push({...row,id:uid(),createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});added++;}
    }
    await updateParts(np);setBusy(false);
    addToast(`Import done: ${added} added, ${updated} updated`,'success');navigate('home');
  };
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:560,margin:'0 auto'}}>
        <button onClick={()=>navigate('home')} style={{...S.btn,background:'#FFFFFF',border:'1.5px solid #E2E8F0',color:'#64748B',padding:'8px 16px',marginBottom:20,borderRadius:10}}>← Home</button>
        <h2 style={{fontWeight:700,color:C.txt,fontSize:26,margin:'0 0 8px',letterSpacing:'-0.5px'}}>Import Excel</h2>
        <p style={{color:C.sub,fontSize:14,margin:'0 0 20px'}}>Parts with matching Part Codes will update; new codes will be added.</p>
        <div style={{...S.card,marginBottom:16,background:'#EEF2FF',border:'1.5px solid #C7D2FE'}}>
          <p style={{color:'#4338CA',fontSize:13,fontWeight:600,margin:'0 0 6px'}}>REQUIRED COLUMN HEADERS:</p>
          <p style={{color:C.sub,fontSize:12,margin:0}}>Part Code · Part Number · Bin Number · Part Name · Supplier · Current Stock · Minimum Stock</p>
        </div>
        <input type="file" accept=".xlsx,.xls" ref={fileRef} onChange={handleFile} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current?.click()} style={{...S.btn,background:'#FAFBFF',border:'2px dashed #CBD5E1',color:'#64748B',padding:'28px 20px',width:'100%',marginBottom:16,fontSize:15,borderRadius:14}}>📥 Click to Upload Excel File</button>
        {preview&&(
          <div style={{...S.card,marginBottom:16}}>
            <p style={{color:C.grn,fontSize:13,fontWeight:600,margin:'0 0 12px'}}>✓ {parsed.length} rows ready (showing first 5):</p>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr>{['Part Code','Part Name','Bin','Stock','Min'].map(h=><th key={h} style={{color:C.sub,padding:'6px 8px',textAlign:'left',borderBottom:`1px solid ${C.bdr}`,whiteSpace:'nowrap'}}>{h}</th>)}</tr></thead>
                <tbody>{preview.map((r,i)=>(
                  <tr key={i}>
                    <td style={{color:C.txt,padding:'6px 8px',borderBottom:`1px solid ${C.bdr}`,fontFamily:'monospace',fontSize:11}}>{r.partCode}</td>
                    <td style={{color:C.txt,padding:'6px 8px',borderBottom:`1px solid ${C.bdr}`}}>{r.partName}</td>
                    <td style={{color:C.sub,padding:'6px 8px',borderBottom:`1px solid ${C.bdr}`}}>{r.binNumber}</td>
                    <td style={{color:C.txt,padding:'6px 8px',borderBottom:`1px solid ${C.bdr}`}}>{r.currentStock}</td>
                    <td style={{color:C.sub,padding:'6px 8px',borderBottom:`1px solid ${C.bdr}`}}>{r.minimumStock}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
            <button onClick={doImport} disabled={busy} style={{...S.btn,background:C.grn,color:'#FFFFFF',padding:'14px 20px',width:'100%',marginTop:16,fontSize:15,opacity:busy?.7:1}}>{busy?'Importing...':`✓ Confirm Import (${parsed.length} rows)`}</button>
          </div>
        )}
      </div>
    </div>
  );
}
function exportExcel(parts,addToast){
  if(!parts.length){addToast('No parts to export','warning');return;}
  const rows=parts.map(p=>({'Part Code':p.partCode,'Part Number':p.partNumber,'Bin Number':p.binNumber,'Part Name':p.partName,'Supplier':p.supplier,'Current Stock':p.currentStock,'Minimum Stock':p.minimumStock}));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Stock');
  XLSX.writeFile(wb,`NHNN_Stock_${new Date().toISOString().slice(0,10)}.xlsx`);
}

      for (const part of p) {
        try {
          const img = await store.get(`img_${part.partCode}`);
          if (img) imgs[part.partCode] = img;
        } catch {}
      }
      setImages(imgs);
      setLoaded(true);
    })();
  }, []);

  const addToast = (msg, type = "success") => {
    const id = uid();
    setToasts(prev => [...prev, { id, msg, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };
  const updateParts = async (np) => { await store.set("parts", np); setParts(np); };
  const updateUsers = async (nu) => { await store.set("users", nu); setUsers(nu); };
  const navigate = (s) => {
    if (s === "exportExcel") { exportExcel(parts, addToast); return; }
    setScreen(s);
    window.scrollTo(0, 0);
  };

  if (!loaded) return (
    <div style={{ minHeight: "100vh", background: "#F0F4FF", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 16 }}>
      <img src={LOGO} alt="NHNN" style={{ width: 80, height: 80, borderRadius: "50%", border: "2px solid #2563EB" }} />
      <p style={{ color: "#64748B", fontFamily: "sans-serif", fontSize: 14 }}>Loading NHNN Stock Control...</p>
    </div>
  );

  if (!pinOk) return <PinScreen onUnlock={() => setPinOk(true)} />;
  const props = { parts, users, images, setImages, updateParts, updateUsers, navigate, addToast, LOGO };
  const screens = {
    home: <HomeScreen {...props} />,
    settings: <SettingsScreen {...props} onChangePIN={() => { store.set('app_pin', null); setPinOk(false); }} />,
    usePart: <UsePartScreen {...props} />,
    addPartMenu: <AddPartMenu {...props} />,
    restockPart: <RestockScreen {...props} />,
    addNewPart: <AddNewPartScreen {...props} />,
    stockCorrection: <StockCorrectionScreen {...props} />,
    importExcel: <ImportExcelScreen {...props} />,
  };

  return (
    <div style={{ fontFamily: "'Inter',system-ui,-apple-system,sans-serif" }}>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      {screens[screen] || screens.home}
      <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", display: "flex", flexDirection: "column", gap: 8, zIndex: 9999, alignItems: "center", pointerEvents: "none" }}>
        {toasts.map(t => <Toast key={t.id} msg={t.msg} type={t.type} />)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
