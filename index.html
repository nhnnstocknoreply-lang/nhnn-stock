function uid(){ return Date.now()+'-'+Math.random().toString(36).slice(2,8); }

function compressImage(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const c=document.createElement('canvas');
        const s=Math.min(1,800/Math.max(img.width,img.height));
        c.width=img.width*s; c.height=img.height*s;
        c.getContext('2d').drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL('image/jpeg',.8));
      };
      img.src=e.target.result;
    };
    r.readAsDataURL(file);
  });
}

async function uploadPhoto(partCode,dataUrl){
  try{
    await db.collection('nhnn').doc('photo_'+partCode).set({v:dataUrl});
    return 'firestore:'+partCode;
  }catch(e){ console.error('uploadPhoto',e); return null; }
}

async function getPhoto(imageUrl){
  if(!imageUrl)return null;
  if(!imageUrl.startsWith('firestore:'))return imageUrl;
  try{
    const doc=await db.collection('nhnn').doc('photo_'+imageUrl.replace('firestore:','')).get();
    return doc.exists?doc.data().v:null;
  }catch(e){ return null; }
}

async function saveParts(parts){ await db.collection('nhnn').doc('parts').set({v:parts}); }
async function saveUsers(users){ await db.collection('nhnn').doc('users').set({v:users}); }

async function sendEmail(to,subject,body,attachments){
  const toArr=(Array.isArray(to)?to:[to]).filter(Boolean);
  if(!toArr.length)return;
  try{
    const payload={to:toArr,subject,text:body};
    if(attachments&&attachments.length)payload.attachments=attachments;
    const res=await fetch('/.netlify/functions/send-email',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    if(!res.ok){const e=await res.text();console.error('Email error:',e);}
  }catch(e){console.error('sendEmail',e);}
}

async function sendEmailWithXlsx(to,subject,body,parts){
  const rows=parts.map(p=>({'Part Code':p.partCode||'','Part Number':p.partNumber||'','Bin Number':p.binNumber||'','Part Name':p.partName||'','Supplier':p.supplier||'','Current Stock':Number(p.currentStock)||0,'Minimum Stock':Number(p.minimumStock)||0}));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:14},{wch:18},{wch:12},{wch:30},{wch:18},{wch:14},{wch:14}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'NHNN Stock');
  const b64=XLSX.write(wb,{bookType:'xlsx',type:'base64'});
  const fname='NHNN_Stock_'+new Date().toISOString().slice(0,10)+'.xlsx';
  await sendEmail(to,subject,body,[{filename:fname,content:b64}]);
}

function emailBody(title,rows){
  const line='─'.repeat(38);
  return 'NHNN STOCK CONTROL\n'+line+'\n'+title+'\n'+line+'\n'+
    rows.map(([k,v])=>k+': '+v).join('\n')+'\n'+line+
    '\nNHNN Stock Control — automated notification';
}

/* ── Toast ── */
function Toast({msg,type,duration}){
  const [pct,setPct]=useState(100);
  const dur=duration||5000;
  const cfg={success:{a:C.green,i:'✓',l:'Success'},error:{a:C.red,i:'✕',l:'Error'},
    warning:{a:C.amber,i:'⚠',l:'Warning'},info:{a:C.blue,i:'i',l:'Info'}}[type]||{a:C.green,i:'✓',l:'Success'};
  useEffect(()=>{
    const t=Date.now();
    const f=()=>{const p=Math.max(0,100-(Date.now()-t)/dur*100);setPct(p);if(p>0)requestAnimationFrame(f);};
    requestAnimationFrame(f);
  },[]);
  return(
    <div style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'0 8px 32px rgba(15,23,42,.18)',maxWidth:320,width:'90vw',border:'1.5px solid #E2E8F0',overflow:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
        <div style={{width:32,height:32,borderRadius:'50%',background:cfg.a+'20',display:'flex',alignItems:'center',justifyContent:'center',color:cfg.a,fontWeight:700,fontSize:15,flexShrink:0}}>{cfg.i}</div>
        <div><div style={{color:C.txt,fontWeight:700,fontSize:13}}>{cfg.l}</div><div style={{color:C.sub,fontSize:13,marginTop:1}}>{msg}</div></div>
      </div>
      <div style={{height:3,background:'#F1F5F9',borderRadius:4,overflow:'hidden'}}><div style={{height:'100%',width:pct+'%',background:cfg.a,transition:'width .1s linear'}}/></div>

/* ── PIN Screen ── */
function PinScreen({onUnlock}){
  const [stored]=useState(()=>localStorage.getItem('nhnn_pin'));
  const [val,setVal]=useState('');
  const [conf,setConf]=useState('');
  const [step,setStep]=useState(stored?'enter':'setup');
  const [err,setErr]=useState('');
  const [shake,setShake]=useState(false);
  const cur=step==='confirm'?conf:val;
  const doShake=()=>{setShake(true);setTimeout(()=>setShake(false),500);};
  const press=d=>{
    if(step==='enter'){
      const n=val+d;setVal(n);
      if(n.length===4){
        if(n===stored){onUnlock();}
        else{setErr('Incorrect PIN');doShake();setTimeout(()=>{setVal('');setErr('');},600);}
      }
    }else if(step==='setup'){
      if(val.length<4)setVal(p=>p+d);
    }else{
      const n=conf+d;setConf(n);
      if(n.length===4){
        if(n===val){localStorage.setItem('nhnn_pin',val);onUnlock();}
        else{setErr('PINs do not match');doShake();setTimeout(()=>{setConf('');setErr('');},600);}
      }
    }
  };
  const del=()=>step==='confirm'?setConf(p=>p.slice(0,-1)):setVal(p=>p.slice(0,-1));
  return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#EEF2FF,#F5F3FF,#FDF2F8)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <img src={LOGO_B64} style={{width:80,height:80,borderRadius:'50%',border:'3px solid '+C.blue,boxShadow:'0 0 0 4px rgba(37,99,235,.12)',marginBottom:20}} alt="NHNN"/>
      <h1 style={{fontSize:22,fontWeight:800,color:C.txt,marginBottom:4,letterSpacing:'-0.5px'}}>NHNN Stock Control</h1>
      <p style={{color:C.sub,fontSize:13,marginBottom:28}}>{step==='setup'?'Create a 4-digit PIN':step==='confirm'?'Confirm your PIN':'Enter PIN to continue'}</p>
      <div style={{display:'flex',gap:12,marginBottom:6,animation:shake?'shake .4s ease':'none'}}>
        {[0,1,2,3].map(i=><div key={i} style={{width:14,height:14,borderRadius:'50%',background:cur.length>i?C.blue:'#E2E8F0',transition:'background .15s'}}/>)}
      </div>
      {err&&<p style={{color:C.red,fontSize:13,margin:'6px 0',fontWeight:500}}>{err}</p>}
      <div style={{height:20}}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,76px)',gap:10}}>
        {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((d,i)=>(
          <button key={i} onClick={()=>d===''?null:d==='⌫'?del():press(String(d))}
            style={{width:76,height:76,borderRadius:14,border:d===''?'none':'1.5px solid #E2E8F0',background:d===''?'transparent':'#fff',fontSize:d==='⌫'?20:22,fontWeight:700,color:C.txt,cursor:d===''?'default':'pointer',boxShadow:d===''?'none':'0 1px 4px rgba(15,23,42,.07)',fontFamily:'inherit'}}>
            {d==='⌫'?'⌫':d}
          </button>
        ))}
      </div>
      {step==='setup'&&val.length===4&&(
        <button onClick={()=>setStep('confirm')} style={{...btn,background:C.blue,color:'#fff',padding:'13px 36px',marginTop:20,fontSize:15}}>Continue →</button>
      )}
      <style>{"@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}"}</style>
    </div>
  );
}

/* ── Part Search ── */
function PartSearch({parts,images,label,onSelect}){
  const [q,setQ]=useState('');
  const [sup,setSup]=useState('');
  const [bin,setBin]=useState('');
  const [open,setOpen]=useState(false);
  const suppliers=[...new Set(parts.map(p=>p.supplier).filter(Boolean))].sort();
  const bins=[...new Set(parts.map(p=>p.binNumber).filter(Boolean))].sort();
  const results=parts.filter(p=>{
    const lq=q.toLowerCase();
    const m=!lq||[p.partCode,p.partNumber,p.partName].some(s=>s?.toLowerCase().includes(lq));
    return m&&(!sup||p.supplier===sup)&&(!bin||p.binNumber===bin);
  }).slice(0,20);
  const pick=p=>{onSelect(p);setQ('');setOpen(false);};
  useEffect(()=>{
    if(!q)return;
    const exact=parts.find(p=>p.partCode===q||p.partNumber===q);
    if(exact)pick(exact);
  },[q]);
  return(
    <div style={{position:'relative'}}>
      <div style={{display:'flex',gap:6,marginBottom:8}}>
        <select value={sup} onChange={e=>setSup(e.target.value)} style={{flex:1,...inp,padding:'8px 10px',fontSize:12,color:C.sub}}>
          <option value="">All Suppliers</option>{suppliers.map(s=><option key={s}>{s}</option>)}
        </select>
        <select value={bin} onChange={e=>setBin(e.target.value)} style={{flex:1,...inp,padding:'8px 10px',fontSize:12,color:C.sub}}>
          <option value="">All Bins</option>{bins.map(b=><option key={b}>{b}</option>)}
        </select>
      </div>
      <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true);}}
        onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),200)}
        onKeyDown={e=>{if(e.key==='Enter'&&results.length>0)pick(results[0]);}}
        placeholder={label||'Search part...'} style={inp}/>
      {open&&(
        <div onMouseDown={e=>e.preventDefault()}
          style={{position:'absolute',top:'calc(100% + 4px)',left:0,right:0,zIndex:200,background:'#fff',border:'1.5px solid #E2E8F0',borderRadius:12,maxHeight:480,overflowY:'auto',boxShadow:'0 8px 32px rgba(15,23,42,.13)'}}>
          {results.length===0
            ?<div style={{padding:16,color:C.sub,textAlign:'center',fontSize:13}}>{parts.length===0?'No parts added yet':'No matches found'}</div>
            :results.map(p=>(
              <div key={p.id} onClick={()=>pick(p)}
                onMouseEnter={e=>e.currentTarget.style.background='#F8FAFC'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
                style={{display:'flex',alignItems:'center',gap:14,padding:'14px 16px',cursor:'pointer',borderBottom:'1px solid #F1F5F9',transition:'background .12s',minHeight:92}}>
                {(images&&images[p.partCode])
                  ?<img src={images[p.partCode]} style={{width:72,height:72,objectFit:'cover',borderRadius:12,flexShrink:0,flexGrow:0,border:'1.5px solid #E2E8F0',display:'block'}}/>
                  :<div style={{width:72,height:72,background:'#F1F5F9',borderRadius:12,flexShrink:0,flexGrow:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28}}>📦</div>}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:C.txt,fontSize:15,fontWeight:700,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.partName}</div>
                  <div style={{color:C.sub,fontSize:13,marginTop:3}}>{p.partCode} · Bin: {p.binNumber} · {p.supplier}</div>
                  <span style={{display:'inline-block',marginTop:4,fontSize:11,fontWeight:600,padding:'2px 8px',borderRadius:4,
                    background:p.currentStock===0?'#FEF2F2':p.currentStock<=p.minimumStock?'#FFFBEB':'#F0FDF4',
                    color:p.currentStock===0?C.red:p.currentStock<=p.minimumStock?'#B45309':'#16A34A'}}>
                    {p.currentStock===0?'Out of stock':p.currentStock<=p.minimumStock?'Low: '+p.currentStock+' left':p.currentStock+' in stock'}
                  </span>
                </div>
              </div>
            ))}
        </div>
      )}
    </div>
  );
}

    // Check badge first
    if(!userId){
      const user=(users||[]).find(u=>u.badge&&u.badge===code);
      if(user){setUserId(user.id);setFoundUser(user);return;}
    }
    // Check part - also try trimmed uppercase/lowercase variants
    const part=parts.find(p=>
      p.partCode===code||p.partNumber===code||
      p.partCode?.toLowerCase()===code.toLowerCase()||
      p.partNumber?.toLowerCase()===code.toLowerCase()
    );
    if(part){
      setItems(prev=>{
        const idx=prev.findIndex(i=>i.part&&i.part.id===part.id);
        if(idx!==-1){
          const updated=[...prev];
          const newQty=Math.min(updated[idx].qty+1,part.currentStock);
          updated[idx]={...updated[idx],qty:newQty};
          return updated;
        }
        return [...prev,{id:uid(),part,qty:1}];
      });
    }else{
      // Show what was scanned so user can compare to part codes
      toast('No match for: "'+code+'" — check part code matches barcode','warning',8000);
    }
  };

  const setQty=(id,q)=>setItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,Math.min(q,i.part?i.part.currentStock:9999))}:i));

  const submit=async()=>{
    if(!userId){toast('Scan your badge or select your name','error');return;}
    const valid=items.filter(i=>i.part);
    if(!valid.length){toast('Scan or select at least one part','error');return;}
    for(const it of valid){
      if(it.part.currentStock===0){toast('"'+it.part.partName+'" is out of stock','error');return;}
      if(it.qty>it.part.currentStock){toast('Only '+it.part.currentStock+' of "'+it.part.partName+'" available','error');return;}
    }
    setBusy(true);
    const user=users.find(u=>u.id===userId);
    const allEmails=users.map(u=>u.email).filter(Boolean);
    let np=[...parts];
    const alerts=[];
    for(const it of valid){
      const i=np.findIndex(p=>p.id===it.part.id);
      if(i===-1)continue;
      const ns=np[i].currentStock-it.qty;
      const ms=np[i].minimumStock;
      np[i]={...np[i],currentStock:ns,updatedAt:new Date().toISOString()};
      if(ns===0)alerts.push({p:np[i],label:'OUT OF STOCK'});
      else if(ns<ms)alerts.push({p:np[i],label:'BELOW MINIMUM ('+ns+' left)'});
      else if(ns===ms)alerts.push({p:np[i],label:'AT MINIMUM ('+ns+' left)'});
      else if(ns===ms+1)alerts.push({p:np[i],label:'NEARING MINIMUM ('+ns+' left)'});
    }
    await saveParts(np);
    await sendEmail([user.email],'Parts Used — NHNN Stock Control',
      emailBody('Parts used by '+user.name+' on '+new Date().toLocaleString(),
        valid.map(it=>[it.part.partName,it.qty+' unit(s) — Code: '+it.part.partCode+' — Bin: '+it.part.binNumber])));
    for(const a of alerts){
      await sendEmail(allEmails,'Stock Alert: '+a.p.partName+' — '+a.label,
        emailBody(a.label,[['Part',a.p.partName],['Code',a.p.partCode],['Bin',a.p.binNumber||'N/A'],['Stock now',a.p.currentStock+' units'],['Min stock',a.p.minimumStock+' units'],['Recorded by',user.name]]));
    }
    setBusy(false);
    toast('Parts recorded + emails sent!','success');
    setItems([]);setUserId('');setFoundUser(null);setBadgeInput('');setScanVal('');
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('home')} style={bBtn}>← Home</button>
        <h2 style={{fontWeight:800,fontSize:30,color:C.txt,margin:'0 0 8px',letterSpacing:'-0.8px'}}>Use Part</h2>
        <p style={{color:C.sub,fontSize:13,margin:'0 0 16px'}}>Scan your badge then scan parts, or use the fields below.</p>

        {/* Scanner capture bar */}
        <div style={{position:'sticky',top:0,zIndex:100,background:'rgba(240,242,255,0.97)',backdropFilter:'blur(8px)',paddingBottom:12,marginBottom:4}}>
          <input ref={scanRef}
            value={scanVal} onChange={e=>setScanVal(e.target.value)}
            onKeyDown={e=>{
              if(e.key==='Enter'){
                const v=scanVal.trim();
                setScanVal('');
                handleScan(v);
              }
            }}
            placeholder="📷 Ready to scan — point scanner here..."
            style={{...inp,border:'1.5px solid '+C.blue,borderRadius:12,fontSize:14,color:C.sub}}
            autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          />
        </div>

        <div style={{...card,marginBottom:14}}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 10px'}}>Who are you?</p>
          {!foundUser?(
            <div style={{position:'relative'}}>
              <input value={badgeInput}
                onChange={e=>{
                  const v=e.target.value;
                  setBadgeInput(v);
                  const user=(users||[]).find(u=>u.badge&&u.badge===v);
                  if(user){setUserId(user.id);setFoundUser(user);setBadgeInput('');}
                }}
                onKeyDown={e=>{
                  if(e.key==='Enter'){
                    const user=(users||[]).find(u=>u.badge&&u.badge===badgeInput);
                    if(user){setUserId(user.id);setFoundUser(user);setBadgeInput('');}
                  }
                }}
                placeholder="Type badge number manually..."
                style={{...inp,paddingRight:44}} autoComplete="off"/>
              <span style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',fontSize:20}}>🪪</span>
            </div>
          ):(
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'#F0FDF4',border:'1.5px solid #86EFAC',borderRadius:10,padding:'12px 16px'}}>
              <div>
                <div style={{fontWeight:700,color:C.txt,fontSize:15}}>{foundUser.name}</div>
                <div style={{color:C.sub,fontSize:12}}>Badge: {foundUser.badge} · {foundUser.email}</div>
              </div>
              <button onClick={()=>{setFoundUser(null);setUserId('');}} style={{...btn,background:'none',color:C.sub,border:'none',fontSize:18,padding:'4px 8px'}}>✕</button>
            </div>
          )}
        </div>

        {items.length>0&&(
          <div style={{...card,marginBottom:14}}>
            <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 12px'}}>Parts to use ({items.length})</p>
            {items.map((it,idx)=>(
              <div key={it.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:idx<items.length-1?'1px solid #F1F5F9':'none'}}>
                {(images&&images[it.part.partCode])?<img src={images[it.part.partCode]} style={{width:56,height:56,objectFit:'cover',borderRadius:8,flexShrink:0,border:'1.5px solid #E2E8F0'}}/>
                  :<div style={{width:56,height:56,background:'#F1F5F9',borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📦</div>}
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:C.txt,fontSize:14}}>{it.part.partName}</div>
                  <div style={{color:C.sub,fontSize:12}}>{it.part.partCode} · Bin: {it.part.binNumber}</div>
                  <div style={{fontSize:12,color:it.part.currentStock<=it.part.minimumStock?C.red:C.green}}>In stock: {it.part.currentStock}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <button onClick={()=>setQty(it.id,it.qty-1)} style={{...btn,background:'#F1F5F9',color:C.txt,width:32,height:32,padding:0,fontSize:16}}>−</button>
                  <span style={{fontWeight:700,fontSize:16,minWidth:24,textAlign:'center'}}>{it.qty}</span>
                  <button onClick={()=>setQty(it.id,it.qty+1)} style={{...btn,background:'#F1F5F9',color:C.txt,width:32,height:32,padding:0,fontSize:16}}>+</button>
                  <button onClick={()=>setItems(p=>p.filter(i=>i.id!==it.id))} style={{...btn,background:'#FEF2F2',color:C.red,border:'1px solid #FEE2E2',width:32,height:32,padding:0,marginLeft:4}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{...card,marginBottom:14}}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 10px'}}>Search Part Manually</p>
          <PartSearch parts={parts} images={images} label="Search by code, name or number" onSelect={p=>{
            setItems(prev=>{
              const idx=prev.findIndex(i=>i.part&&i.part.id===p.id);
              if(idx!==-1){
                const updated=[...prev];
                updated[idx]={...updated[idx],qty:Math.min(updated[idx].qty+1,p.currentStock)};
                return updated;
              }
              return [...prev,{id:uid(),part:p,qty:1}];
            });
          }}/>
        </div>

        <button onClick={submit} disabled={busy||!items.length||!userId}
          style={{...btn,background:items.length&&userId?C.blue:'#CBD5E1',color:'#fff',padding:'16px 20px',width:'100%',fontSize:16,opacity:busy?.7:1}}>
          {busy?'Processing...':'Confirm + Send Email'+(items.length?' ('+items.length+' part'+(items.length>1?'s':'')+')':'')}
        </button>
      </div>
    </div>
  );
}

/* ── Restock ── */
function RestockScreen({parts,images,navigate,toast}){
  const [items,setItems]=useState([]);
  const [busy,setBusy]=useState(false);
  const [restockVal,setRestockVal]=useState('');
  const scanRef=useRef(null);

  useEffect(()=>{
    setTimeout(()=>scanRef.current&&scanRef.current.focus(),100);
  },[]);

  const handleScan=val=>{
    const code=val.trim();
    if(!code)return;
    const part=parts.find(p=>
      p.partCode===code||p.partNumber===code||
      p.partCode?.toLowerCase()===code.toLowerCase()||
      p.partNumber?.toLowerCase()===code.toLowerCase()
    );
    if(part){
      setItems(prev=>{
        const idx=prev.findIndex(i=>i.part&&i.part.id===part.id);
        if(idx!==-1){
          const updated=[...prev];
          updated[idx]={...updated[idx],qty:updated[idx].qty+1};
          return updated;
        }
        return [...prev,{id:uid(),part,qty:1}];
      });
    }
  };

  const setQty=(id,q)=>setItems(prev=>prev.map(i=>i.id===id?{...i,qty:Math.max(1,q)}:i));

  const submit=async()=>{
    const valid=items.filter(i=>i.part);
    if(!valid.length){toast('Scan or select at least one part','error');return;}
    setBusy(true);
    const np=parts.map(p=>{
      const it=valid.find(i=>i.part.id===p.id);
      return it?{...p,currentStock:p.currentStock+it.qty,updatedAt:new Date().toISOString()}:p;
    });
    await saveParts(np);setBusy(false);setRestockVal('');
    toast(valid.length+' part(s) restocked!','success');navigate('addMenu');
  };

  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('addMenu')} style={bBtn}>← Back</button>

        <p style={{color:C.sub,fontSize:13,margin:'0 0 16px'}}>Scan parts to add them — scan the same part again to increase quantity.</p>

        <div style={{position:'sticky',top:0,zIndex:100,background:'rgba(240,242,255,0.97)',backdropFilter:'blur(8px)',paddingBottom:12,marginBottom:4}}>
          <input ref={scanRef}
            value={restockVal} onChange={e=>setRestockVal(e.target.value)}
            onKeyDown={e=>{
              if(e.key==='Enter'){
                const v=restockVal.trim();
                setRestockVal('');
                handleScan(v);
              }
            }}
            placeholder="📷 Ready to scan — point scanner here..."
            style={{...inp,border:'1.5px solid '+C.green,borderRadius:12,fontSize:14,color:C.sub}}
            autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false"
          />
        </div>

        {items.length>0&&(
          <div style={{...card,marginBottom:14}}>
            <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 12px'}}>Parts to restock ({items.length})</p>
            {items.map((it,idx)=>(
              <div key={it.id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:idx<items.length-1?'1px solid #F1F5F9':'none'}}>
                {(images&&images[it.part.partCode])?<img src={images[it.part.partCode]} style={{width:56,height:56,objectFit:'cover',borderRadius:8,flexShrink:0,border:'1.5px solid #E2E8F0'}}/>
                  :<div style={{width:56,height:56,background:'#F1F5F9',borderRadius:8,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📦</div>}
                <div style={{flex:1}}>
                  <div style={{fontWeight:700,color:C.txt,fontSize:14}}>{it.part.partName}</div>
                  <div style={{color:C.sub,fontSize:12}}>{it.part.partCode} · Bin: {it.part.binNumber}</div>
                  <div style={{color:C.green,fontSize:12}}>Current: {it.part.currentStock} → After: {it.part.currentStock+it.qty}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <button onClick={()=>setQty(it.id,it.qty-1)} style={{...btn,background:'#F1F5F9',color:C.txt,width:32,height:32,padding:0,fontSize:16}}>−</button>
                  <span style={{fontWeight:700,fontSize:16,minWidth:24,textAlign:'center'}}>{it.qty}</span>
                  <button onClick={()=>setQty(it.id,it.qty+1)} style={{...btn,background:'#F1F5F9',color:C.txt,width:32,height:32,padding:0,fontSize:16}}>+</button>
                  <button onClick={()=>setItems(p=>p.filter(i=>i.id!==it.id))} style={{...btn,background:'#FEF2F2',color:C.red,border:'1px solid #FEE2E2',width:32,height:32,padding:0,marginLeft:4}}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}

        <div style={{...card,marginBottom:14}}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 10px'}}>Search Part Manually</p>
          <PartSearch parts={parts} images={images} label="Search part to restock" onSelect={p=>{
            setItems(prev=>{
              const idx=prev.findIndex(i=>i.part&&i.part.id===p.id);
              if(idx!==-1){
                const updated=[...prev];
                updated[idx]={...updated[idx],qty:updated[idx].qty+1};
                return updated;
              }
              return [...prev,{id:uid(),part:p,qty:1}];
            });
          }}/>

        <button onClick={submit} disabled={busy||!items.length}

        </button>
      </div>
    </div>
  );
}

/* ── New Part ── */
function NewPartScreen({parts,users,images,setImages,navigate,toast}){
  const [form,setForm]=useState({partCode:'',partNumber:'',binNumber:'',partName:'',supplier:'',currentStock:'',minimumStock:''});
  const [img,setImg]=useState(null);
  const [busy,setBusy]=useState(false);
  const fref=useRef(null);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleImg=async e=>{const f=e.target.files[0];if(f)setImg(await compressImage(f));};
  const submit=async()=>{
    if(!form.partCode.trim()||!form.partName.trim()||form.currentStock===''||form.minimumStock===''){
      toast('Part Code, Name, Current Stock + Min Stock required','error');return;
    }
    if(parts.some(p=>p.partCode===form.partCode.trim())){toast('Part Code already exists','error');return;}
    setBusy(true);
    let imageUrl=null;
    if(img)imageUrl=await uploadPhoto(form.partCode.trim(),img);
    const part={id:uid(),partCode:form.partCode.trim(),partNumber:form.partNumber.trim(),
      binNumber:form.binNumber.trim(),partName:form.partName.trim(),supplier:form.supplier.trim(),
      currentStock:parseInt(form.currentStock)||0,minimumStock:parseInt(form.minimumStock)||0,
      imageUrl,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()};
    await saveParts([...parts,part]);
    if(img&&imageUrl)setImages(prev=>({...prev,[part.partCode]:img}));
    const mgrs=(users||[]).filter(u=>u.isManager).map(u=>u.email).filter(Boolean);
    if(mgrs.length)await sendEmail(mgrs,'New Part Added — '+part.partName,
      emailBody('New Part Added',[['Part Name',part.partName],['Part Code',part.partCode],['Bin Number',part.binNumber||'N/A'],['Supplier',part.supplier||'N/A'],['Initial Stock',part.currentStock+' units'],['Min Stock',part.minimumStock+' units']]));
    setBusy(false);toast('Part added! Managers notified.','success');navigate('addMenu');
  };
  const fields=[
    {k:'partCode',l:'Part Code (NHNN)',req:true,ph:'e.g. NHNN-001'},
    {k:'partNumber',l:'Part Number (Manufacturer)',ph:'Manufacturer ref'},
    {k:'partName',l:'Part Name',req:true,ph:'Descriptive name'},
    {k:'binNumber',l:'Bin Number',ph:'e.g. A1, Shelf B3'},
    {k:'supplier',l:'Supplier',ph:'Supplier name'},
    {k:'currentStock',l:'Current Stock',req:true,ph:'0',t:'number'},
    {k:'minimumStock',l:'Minimum Stock',req:true,ph:'0',t:'number'},
  ];
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('addMenu')} style={bBtn}>← Back</button>
        <h2 style={{fontWeight:800,fontSize:30,color:C.txt,margin:'0 0 20px',letterSpacing:'-0.8px'}}>Add New Part</h2>
        <div style={card}>
          {fields.map(f=>(
            <div key={f.k} style={{marginBottom:14}}>
              <label style={{display:'block',color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:6}}>
                {f.l}{f.req&&<span style={{color:C.red}}> *</span>}
              </label>
              <input type={f.t||'text'} value={form[f.k]} onChange={e=>set(f.k,e.target.value)} placeholder={f.ph} style={inp}/>
            </div>
          ))}
          <div style={{marginBottom:16}}>
            <label style={{display:'block',color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:6}}>Part Photo</label>
            <input type="file" accept="image/*" capture="environment" ref={fref} onChange={handleImg} style={{display:'none'}}/>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <button onClick={()=>fref.current&&fref.current.click()} style={{...btn,background:'#F8FAFC',border:'1.5px solid #E2E8F0',color:C.txt,padding:'10px 16px'}}>📷 Upload Photo</button>
              {img&&<><img src={img} style={{width:56,height:56,objectFit:'cover',borderRadius:8,border:'1.5px solid #E2E8F0'}}/><button onClick={()=>setImg(null)} style={{...btn,background:'none',color:C.sub,border:'none',padding:'4px 8px',fontSize:18}}>✕</button></>}
            </div>
          </div>
          <button onClick={submit} disabled={busy} style={{...btn,background:C.blue,color:'#fff',padding:'16px 20px',width:'100%',fontSize:16,opacity:busy?.7:1}}>{busy?'Uploading...':'Add Part (Managers notified)'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Stock Correction ── */
function CorrectionScreen({parts,users,images,setImages,navigate,toast}){
  const [sel,setSel]=useState(null);
  const [form,setForm]=useState({});
  const [newStock,setNewStock]=useState('');
  const [reason,setReason]=useState('');
  const [img,setImg]=useState(null);
  const [busy,setBusy]=useState(false);
  const fref=useRef(null);
  const pick=p=>{setSel(p);setForm({partNumber:p.partNumber||'',partName:p.partName,binNumber:p.binNumber||'',supplier:p.supplier||'',minimumStock:p.minimumStock});setNewStock(String(p.currentStock));setImg(null);};
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const handleImg=async e=>{const f=e.target.files[0];if(f)setImg(await compressImage(f));};
  const submit=async()=>{
    if(!sel){toast('Select a part','error');return;}
    if(newStock===''){toast('Enter corrected quantity','error');return;}
    setBusy(true);
    const corrected=parseInt(newStock)||0;
    let imageUrl=sel.imageUrl||null;
    if(img)imageUrl=await uploadPhoto(sel.partCode,img);
    const np=parts.map(p=>p.id===sel.id?{...p,...form,minimumStock:parseInt(form.minimumStock)||0,currentStock:corrected,imageUrl,updatedAt:new Date().toISOString()}:p);
    await saveParts(np);
    if(img&&imageUrl)setImages(prev=>({...prev,[sel.partCode]:img}));
    const mgrs=(users||[]).filter(u=>u.isManager).map(u=>u.email).filter(Boolean);
    if(mgrs.length)await sendEmail(mgrs,'Stock Correction — '+sel.partName,
      emailBody('Stock Correction',[['Part',sel.partName],['Code',sel.partCode],['Previous Stock',sel.currentStock+' units'],['New Stock',corrected+' units'],['Bin',form.binNumber||'N/A'],['Reason',reason||'Not specified']]));
    setBusy(false);toast('Correction saved! Managers notified.','success');navigate('addMenu');
  };
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('addMenu')} style={bBtn}>← Back</button>
        <h2 style={{fontWeight:800,fontSize:30,color:C.txt,margin:'0 0 6px',letterSpacing:'-0.8px'}}>Stock Correction</h2>
        <div style={{background:'#FFFBEB',border:'1.5px solid #FCD34D',borderRadius:10,padding:'10px 14px',marginBottom:20,fontSize:13,color:'#92400E'}}>⚠️ Managers will be notified of all corrections.</div>
        <div style={{...card,marginBottom:14}}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 10px'}}>Find Part</p>
          <PartSearch parts={parts} images={images} label="Search part to correct" onSelect={pick}/>
        </div>
        {sel&&(
          <div style={card}>
            <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 14px'}}>Correction Details</p>
            {[{k:'partName',l:'Part Name'},{k:'partNumber',l:'Part Number'},{k:'binNumber',l:'Bin Number'},{k:'supplier',l:'Supplier'},{k:'minimumStock',l:'Minimum Stock',t:'number'}].map(f=>(
              <div key={f.k} style={{marginBottom:12}}>
                <label style={{display:'block',color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:5}}>{f.l}</label>
                <input type={f.t||'text'} value={form[f.k]||''} onChange={e=>set(f.k,e.target.value)} style={inp}/>
              </div>
            ))}
            <div style={{marginBottom:12,background:'#FFFBEB',border:'1.5px solid #FDE68A',borderRadius:10,padding:12}}>
              <label style={{display:'block',color:'#B45309',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:8}}>Corrected Stock Quantity</label>
              <input type="number" min="0" value={newStock} onChange={e=>setNewStock(e.target.value)} style={{...inp,borderColor:'#FCD34D'}}/>
              <p style={{color:C.sub,fontSize:12,marginTop:6}}>Was: {sel.currentStock} → Will become: {newStock||0}</p>
            </div>
            <div style={{marginBottom:12}}>
              <label style={{display:'block',color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:5}}>Reason for Correction</label>
              <textarea value={reason} onChange={e=>setReason(e.target.value)} placeholder="e.g. Audit discrepancy, damaged goods..." rows={3} style={{...inp,resize:'vertical'}}/>
            </div>
            <div style={{marginBottom:16}}>
              <label style={{display:'block',color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',marginBottom:6}}>Update Photo <span style={{color:'#CBD5E1',fontWeight:400,textTransform:'none',fontSize:11}}>(optional)</span></label>
              <input type="file" accept="image/*" capture="environment" ref={fref} onChange={handleImg} style={{display:'none'}}/>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <button onClick={()=>fref.current&&fref.current.click()} style={{...btn,background:'#F8FAFC',border:'1.5px solid #E2E8F0',color:C.txt,padding:'10px 16px'}}>📷 {(images&&images[sel.partCode])?'Replace Photo':'Add Photo'}</button>
                {(img||(images&&images[sel.partCode]))&&<img src={img||(images&&images[sel.partCode])} style={{width:56,height:56,objectFit:'cover',borderRadius:8,border:'1.5px solid #E2E8F0'}}/>}
                {img&&<button onClick={()=>setImg(null)} style={{...btn,background:'none',color:C.sub,border:'none',padding:'4px 8px',fontSize:18}}>✕</button>}
              </div>
            </div>
            <button onClick={submit} disabled={busy} style={{...btn,background:C.amber,color:'#fff',padding:'14px 20px',width:'100%',fontSize:15,opacity:busy?.7:1,marginBottom:10}}>{busy?'Saving...':'Apply Correction — Notify Managers'}</button>
            <button onClick={async()=>{
              if(!window.confirm('Delete "'+sel.partName+'" permanently? This cannot be undone.'))return;
              const np=parts.filter(p=>p.id!==sel.id);
              await saveParts(np);
              try{await db.collection('nhnn').doc('photo_'+sel.partCode).delete();}catch(e){}
              toast(sel.partName+' deleted','success');
              navigate('addMenu');
            }} style={{...btn,background:'#FEF2F2',color:C.red,border:'1.5px solid #FEE2E2',padding:'12px 20px',width:'100%',fontSize:14}}>🗑 Delete This Part Permanently</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Import ── */
function ImportScreen({parts,navigate,toast}){
  const [preview,setPreview]=useState(null);
  const [parsed,setParsed]=useState([]);
  const [busy,setBusy]=useState(false);
  const fref=useRef(null);
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=evt=>{
      try{
        const wb=XLSX.read(evt.target.result,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
        const mapped=rows.map(r=>({
          partCode:String(r['Part Code']||r['PART CODE']||r['partCode']||'').trim(),
          partNumber:String(r['Part Number']||r['PART NUMBER']||r['partNumber']||'').trim(),
          binNumber:String(r['Bin Number']||r['BIN NUMBER']||r['binNumber']||'').trim(),
          partName:String(r['Part Name']||r['PART NAME']||r['partName']||'').trim(),
          supplier:String(r['Supplier']||r['SUPPLIER']||r['supplier']||'').trim(),
          currentStock:parseInt(r['Current Stock']||r['CURRENT STOCK']||r['currentStock'])||0,
          minimumStock:parseInt(r['Minimum Stock']||r['MINIMUM STOCK']||r['minimumStock'])||0,
        }));
        const valid=mapped.filter(r=>r.partCode&&r.partName);
        const skipped=mapped.length-valid.length;
        if(skipped>0)toast(skipped+' row(s) skipped — missing Part Code or Part Name','warning');
        if(!valid.length){toast('No valid rows found','error');return;}
        setParsed(valid);setPreview(valid.slice(0,5));
      }catch(e){toast('Could not read file','error');}
    };
    r.readAsBinaryString(f);
  };
  const doImport=async()=>{
    if(!parsed.length)return;setBusy(true);
    let np=[...parts];let added=0,updated=0;
    for(const row of parsed){
      const i=np.findIndex(p=>p.partCode===row.partCode);
      if(i!==-1){np[i]={...np[i],...row,updatedAt:new Date().toISOString()};updated++;}
      else{np.push({...row,id:uid(),imageUrl:null,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString()});added++;}
    }
    await saveParts(np);setBusy(false);
    toast('Import done: '+added+' added, '+updated+' updated','success');navigate('home');
  };
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('home')} style={bBtn}>← Home</button>
        <h2 style={{fontWeight:800,fontSize:30,color:C.txt,margin:'0 0 8px',letterSpacing:'-0.8px'}}>Import Excel</h2>
        <p style={{color:C.sub,fontSize:14,margin:'0 0 16px'}}>Matching Part Codes update. New Part Codes get added.</p>
        <div style={{...card,background:'#EEF2FF',border:'1.5px solid #C7D2FE',marginBottom:16}}>
          <p style={{color:'#4338CA',fontSize:13,fontWeight:600,margin:'0 0 4px'}}>Required columns:</p>
          <p style={{color:C.sub,fontSize:12,margin:0}}>Part Code · Part Number · Bin Number · Part Name · Supplier · Current Stock · Minimum Stock</p>
        </div>
        <input type="file" accept=".xlsx,.xls" ref={fref} onChange={handleFile} style={{display:'none'}}/>
        <button onClick={()=>fref.current&&fref.current.click()} style={{...btn,background:'#FAFBFF',border:'2px dashed #CBD5E1',color:C.sub,padding:'28px 20px',width:'100%',marginBottom:16,fontSize:15,borderRadius:14,fontFamily:'inherit'}}>📥 Click to Upload Excel File</button>
        {preview&&(
          <div style={card}>
            <p style={{color:C.green,fontSize:13,fontWeight:600,margin:'0 0 12px'}}>{'✓ '+parsed.length+' valid rows (showing first 5):'}</p>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead><tr>{['Code','Name','Bin','Supplier','Stock','Min'].map(h=><th key={h} style={{color:C.sub,padding:'6px 8px',textAlign:'left',borderBottom:'1px solid #F1F5F9'}}>{h}</th>)}</tr></thead>
                <tbody>{preview.map((r,i)=>(
                  <tr key={i}>{[r.partCode,r.partName,r.binNumber,r.supplier,r.currentStock,r.minimumStock].map((v,j)=>(
                    <td key={j} style={{color:C.txt,padding:'6px 8px',borderBottom:'1px solid #F1F5F9'}}>{v}</td>
                  ))}</tr>
                ))}</tbody>
              </table>
            </div>
            <button onClick={doImport} disabled={busy} style={{...btn,background:C.green,color:'#fff',padding:'13px 20px',width:'100%',marginTop:14,fontSize:15,opacity:busy?.7:1}}>{busy?'Importing...':'Confirm Import ('+parsed.length+' rows)'}</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── Export ── */
function ExportScreen({parts,navigate,toast}){
  const [email,setEmail]=useState('');
  const [sending,setSending]=useState(false);
  const fname='NHNN_Stock_'+new Date().toISOString().slice(0,10)+'.xlsx';
  const doDownload=()=>{
    if(!parts.length){toast('No parts to export','warning');return;}
    const rows=parts.map(p=>({'Part Code':p.partCode||'','Part Number':p.partNumber||'','Bin Number':p.binNumber||'','Part Name':p.partName||'','Supplier':p.supplier||'','Current Stock':Number(p.currentStock)||0,'Minimum Stock':Number(p.minimumStock)||0}));
    const ws=XLSX.utils.json_to_sheet(rows);
    ws['!cols']=[{wch:14},{wch:18},{wch:12},{wch:30},{wch:18},{wch:14},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'NHNN Stock');
    XLSX.writeFile(wb,fname);
    toast('Exported successfully!','success');
  };
  const doEmail=async()=>{
    if(!email.trim()){toast('Enter an email address','error');return;}
    if(!parts.length){toast('No parts to export','warning');return;}
    setSending(true);
    await sendEmailWithXlsx([email.trim()],'NHNN Stock Export — '+new Date().toLocaleDateString('en-GB'),
      'Please find the attached NHNN Stock Control export.\n\nDate: '+new Date().toLocaleString()+'\nTotal parts: '+parts.length,parts);
    setSending(false);toast('Excel file emailed to '+email.trim(),'success');
  };
  return(
    <div style={{minHeight:'100vh',background:C.bg,padding:20}}>
      <div style={{maxWidth:640,margin:'0 auto'}}>
        <button onClick={()=>navigate('home')} style={bBtn}>← Home</button>
        <h2 style={{fontWeight:800,fontSize:30,color:C.txt,margin:'0 0 8px',letterSpacing:'-0.8px'}}>Export Stock</h2>
        <p style={{color:C.sub,fontSize:14,margin:'0 0 20px'}}>Download or email your stock list.</p>
        <div style={{...card,marginBottom:14}}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 12px'}}>Download File</p>
          <div style={{background:'#F8FAFC',border:'1.5px solid #E2E8F0',borderRadius:10,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
            <span style={{fontSize:24}}>📊</span>
            <div><div style={{color:C.txt,fontWeight:600,fontSize:13}}>{fname}</div><div style={{color:C.sub,fontSize:12}}>{parts.length} parts · 7 columns · import-ready format</div></div>
          </div>
          <button onClick={doDownload} style={{...btn,background:C.blue,color:'#fff',padding:'13px 20px',width:'100%',fontSize:15}}>Download Excel</button>
        </div>
        <div style={card}>
          <p style={{color:'#94A3B8',fontSize:11,fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',margin:'0 0 12px'}}>Email Excel File</p>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="recipient@example.com" type="email" style={{...inp,marginBottom:12}}/>
          <button onClick={doEmail} disabled={sending} style={{...btn,background:C.green,color:'#fff',padding:'13px 20px',width:'100%',fontSize:15,opacity:sending?.7:1}}>{sending?'Sending...':'📧 Email Excel File'}</button>
        </div>
      </div>
    </div>
  );
}

/* ── Main App ── */
function App(){
  const [screen,setScreen]=useState('home');
  const [parts,setParts]=useState([]);
  const [users,setUsers]=useState([]);
  const [images,setImages]=useState({});
  const [toasts,setToasts]=useState([]);
  const [loaded,setLoaded]=useState(false);
  const [pinOk,setPinOk]=useState(false);

  useEffect(()=>{
    let unP=null,unU=null;
    const unAuth=firebase.auth().onAuthStateChanged(user=>{
      if(user){
        unP=db.collection('nhnn').doc('parts').onSnapshot(
          async s=>{
            const p=s.exists?(s.data().v||[]):[];
            setParts(p);
            const imgs={};
            await Promise.all(p.map(async part=>{
              if(part.imageUrl){
                const url=await getPhoto(part.imageUrl);
                if(url)imgs[part.partCode]=url;
              }
            }));
            setImages(imgs);
            setLoaded(true);
          },
          e=>{console.error('parts:',e);setLoaded(true);}
        );
        unU=db.collection('nhnn').doc('users').onSnapshot(
          s=>setUsers(s.exists?(s.data().v||[]):[]),
          e=>console.error('users:',e)
        );
      }
    });
    firebase.auth().signInAnonymously().catch(e=>{console.error('auth:',e);setLoaded(true);});
    return()=>{unAuth();if(unP)unP();if(unU)unU();};
  },[]);

  const toast=(msg,type,dur)=>{
    const id=uid();
    setToasts(p=>[...p,{id,msg,type:type||'success',dur:dur||5000}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),(dur||5000)+300);
  };
  const nav=s=>{setScreen(s);window.scrollTo(0,0);};
  const resetPin=()=>{localStorage.removeItem('nhnn_pin');setPinOk(false);};
  const su=async nu=>{await saveUsers(nu);};

  if(!loaded)return(
    <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#EEF2FF,#F5F3FF,#FDF2F8)',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <img src={LOGO_B64} style={{width:80,height:80,borderRadius:'50%',border:'2px solid #2563EB'}} alt="NHNN"/>
      <p style={{color:'#64748B',fontFamily:'Inter,sans-serif',fontSize:14}}>Connecting to NHNN database...</p>
    </div>
  );

  if(!pinOk)return <PinScreen onUnlock={()=>setPinOk(true)}/>;

  const p={parts,users,images,setImages,navigate:nav,toast};

  function Screen(){
    switch(screen){
      case 'settings':   return <SettingsScreen {...p} saveUsers={su} resetPin={resetPin}/>;
      case 'usePart':    return <UsePartScreen {...p}/>;
      case 'addMenu':    return <AddMenu {...p}/>;
      case 'restock':    return <RestockScreen {...p}/>;
      case 'newPart':    return <NewPartScreen {...p}/>;
      case 'correction': return <CorrectionScreen {...p}/>;
      case 'import':     return <ImportScreen {...p}/>;
      case 'export':     return <ExportScreen {...p}/>;
      default:           return <HomeScreen {...p}/>;
    }
  }

  return(
    <div style={{fontFamily:"'Inter',system-ui,sans-serif"}}>
      <Screen/>
      <div style={{position:'fixed',bottom:24,left:'50%',transform:'translateX(-50%)',display:'flex',flexDirection:'column',gap:8,zIndex:9999,alignItems:'center',pointerEvents:'none'}}>
        {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} duration={t.dur}/>)}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
